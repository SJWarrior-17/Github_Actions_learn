name: Test-MiniKube-Cluster
on:
  - push
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: start minikube
        id: minikube
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          addons: ingress
      # now you can run kubectl to see the pods in the cluster
      - name: kubectl
        run: | 
          kubectl get pods -A
          kubectl get pods -n ingress-nginx
          kubectl get svc -n ingress-nginx

      - name: Fetching ingress controller IP detils and store in GitHub actions Environment Variables
        run: |
          echo "INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.clusterIP}')" >> "$GITHUB_ENV"
          echo ${{ env.INGRESS_IP }}

    